<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App</title>

    <style>
        :root {
            --color1: #0060df;
            /* --color2: #cdcdcd; */
            /* --color2: #f0f0f0; */
            --color2: #e9e9ed;
        }

        body {
            background-image: url("/home/neo/Documents/workspace/music-app/img/chill-mario.gif");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            color: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            user-select: none;
            font-size: .875rem;
            opacity: .9;
        }

        table th,
        td {
            /* border: 1px solid #676774; */
            /* border: 1px solid #ccc; */
            padding: 4px;
        }

        table tr td:nth-child(3) {
            text-align: right;
        }

        table tr:hover {
            /* background-color: #cdcdcd; */
            background-color: #313538;
            cursor: pointer;
        }

        .selected {
            /* #0060df #2374ff */
            background-color: #0060df !important;
            color: #fff;
        }

        .icon {
            height: 1.5em;
            width: auto;
        }

        #controls {
            display: flex;
            /* align-items: center; */
            justify-content: center;
            gap: 1rem;
        }

        #controls button {
            display: flex;
            align-items: center;
        }

        .btn {
            padding: 5px 8px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .visible {
            display: block;
        }

        .text-center {
            text-align: center;
        }

        .text-right {
            text-align: right;
        }

        /* Input range styling */
        .slider {
            -webkit-appearance: none;
            width: 100%;
            margin: 0;
            background: transparent;
            /* height: 4px; */
        }

        .slider:focus {
            outline: none;
        }

        /* Google Chrome */
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            margin-top: -5px;
            height: 13px;
            width: 13px;
            border-radius: 50%;
            background-color: var(--color1);
            cursor: pointer;
        }

        .slider::-webkit-slider-runnable-track {
            height: 4px;
            cursor: pointer;
            background-color: var(--color2);
            border-radius: 2px;
        }

        .slider:focus::-webkit-slider-runnable-track {
            background: var(--color1);
        }

        /* Mozilla Firefox */
        .slider::-moz-range-thumb {
            height: 13px;
            width: 13px;
            border: none;
            border-radius: 50%;
            background-color: var(--color1);
            cursor: pointer;
        }

        .slider::-moz-range-progress {
            background-color: var(--color1);
            height: 4px;
            border-radius: 2px;
        }

        .slider::-moz-range-track {
            height: 4px;
            cursor: pointer;
            background-color: var(--color2);
            border-radius: 2px;
        }

        /* End input range styling */

        .flex {
            display: flex;
            align-items: center;
        }

        .center {
            justify-content: center;
        }

        .space-between {
            justify-content: space-between;
        }

        .fs-12 {
            font-size: .75rem;
        }

        .fs-14 {
            font-size: .875rem;
        }

        .mb-1 {
            margin-bottom: 1rem;
        }

        .mb-15 {
            margin-bottom: 1.5rem;
        }

        .mb-2 {
            margin-bottom: 2rem;
        }

        .mt-1 {
            margin-top: 1rem;
        }

        .mt-15 {
            margin-top: 1.5rem;
        }

        .mt-2 {
            margin-top: 2rem;
        }

        #playlist {
            height: 256px;
            overflow-y: auto;
        }

        #playlist::-webkit-scrollbar {
            width: 10px;
        }

        #playlist::-webkit-scrollbar-thumb {
            background-color: rgba(205, 205, 205, 1);
            border-radius: 5px;
        }

        #playlist::-webkit-scrollbar-thumb:hover {
            background-color: rgba(165, 165, 165, 1);
        }

        .container {
            width: 100%;
            max-width: 360px;
            margin: auto;
            padding: 1rem;
            border-radius: 1rem;
            /* box-shadow: 0 0 1rem rgba(3, 3, 3, .5); */
            /* background-color: rgba(3, 3, 3, .8); */
            background-color: rgba(3, 8, 22, .8);
        }
    </style>
</head>

<body style="margin: 2rem;">

        <input type="range" id="" style="width: 100%;writing-mode: sideways-lr;">
    </div> -->

    <script>
        "use strict";

        const d = document;

        let URL = `https://neobte.github.io/music-player/audio/salsa/`;
        let songList, songListCopy, songMap, songListLength, songIndex = 0;
        let previousRow = null;
        let isShuffle = false;
        let repeatState = 0, isRepeatAll = false;
        let timeoutID, isFirstClick = true;
        let currentVolume = 1; // 1 = 100 %

        const audioPlayer = new Audio();

        const tbody = d.getElementById("body");
        const artistName = d.getElementById("artist-name");
        const songTitle = d.getElementById("song-title");

        const shuffleBtn = d.getElementById("shuffle-btn");
        const backwardBtn = d.getElementById("backward-btn");
        const playPauseBtn = d.getElementById("play-pause-btn");
        const [playIcon, pauseIcon] = playPauseBtn.children;
        const forwardBtn = d.getElementById("forward-btn");
        const repeatBtn = d.getElementById("repeat-icon");

        const audioCurrentTimeSlider = d.getElementById("audio-current-time-slider");
        const currentTime = d.getElementById("current-time");
        const duration = d.getElementById("duration");

        const volumeBtn = d.getElementById("volume-btn");
        const volumeSlider = d.getElementById("volume-slider");
        const volumeDisplay = d.getElementById("volume-display");

        d.addEventListener("DOMContentLoaded", () => {
            init();
        });

        const init = () => {
            sendHttpRequest("GET", URL + "playlist.json", null, handleResponse);
            audioCurrentTimeSlider.value = 0;
            volumeSlider.value = 100;
        }

        // Volume slider
        volumeSlider.addEventListener("input", () => {
            volumeDisplay.textContent = volumeSlider.value;
            audioPlayer.volume = volumeSlider.value / 100;
            if (volumeSlider.value === "0") {
                volumeBtn.children[0].style.display = "none";
                volumeBtn.children[1].style.display = "block";
                audioPlayer.muted = true;
                currentVolume = .5; // 50 %
                volumeBtn.title = "Activar sonido";
            } else {
                volumeBtn.children[1].style.display = "none";
                volumeBtn.children[0].style.display = "block";
                audioPlayer.muted = false;
                currentVolume = volumeSlider.value / 100; //  Values are between 0 y 100
                volumeBtn.title = "Silenciar";
            }
        });

        volumeBtn.addEventListener("click", () => {
            audioPlayer.muted = !audioPlayer.muted;
            if (audioPlayer.muted) {
                audioPlayer.volume = 0;
                volumeSlider.value = 0;
                volumeBtn.children[0].style.display = "none";
                volumeBtn.children[1].style.display = "block";
                volumeBtn.title = "Activar sonido";
            } else {
                audioPlayer.volume = currentVolume; // Values are  between 0.1 and 1, where 1 = 100 %
                volumeSlider.value = currentVolume * 100; // Values are between 0 and 100
                volumeBtn.children[1].style.display = "none";
                volumeBtn.children[0].style.display = "block";
                volumeBtn.title = "Silenciar";
            }
            volumeDisplay.textContent = volumeSlider.value;
        });

        // Current time slider
        audioPlayer.addEventListener("loadedmetadata", () => {
            currentTime.textContent = formatTime(audioPlayer.currentTime);
            duration.textContent = formatTime(audioPlayer.duration);
            audioCurrentTimeSlider.value = audioPlayer.currentTime;
            audioCurrentTimeSlider.max = audioPlayer.duration;
        });

        audioPlayer.addEventListener("timeupdate", () => {
            currentTime.textContent = formatTime(audioPlayer.currentTime);
            audioCurrentTimeSlider.value = audioPlayer.currentTime;
        });

        audioCurrentTimeSlider.addEventListener("input", () => {
            audioPlayer.currentTime = audioCurrentTimeSlider.value;
        });

        // Audio ended event
        audioPlayer.addEventListener("ended", () => {
            if (songIndex >= songListLength - 1 && !isRepeatAll) {
                playIcon.style.display = "block";
                pauseIcon.style.display = "none";
                playPauseBtn.title = "Reproducir";
                return;
            }
            forwardBtn.click();
            playAudio();
        });

        // Shuffle event
        shuffleBtn.addEventListener("click", () => {
            if (audioPlayer.src === "") return;
            isShuffle = !isShuffle;
            if (isShuffle) {
                shufflePlayback(songListCopy);
                shuffleBtn.children[0].querySelector("rect").style.display = "block";
                // console.log(songListCopy);
                shuffleBtn.title = "Desactivar orden aleatorio";
            } else {
                sequentialPlayback(songList);
                shuffleBtn.children[0].querySelector("rect").style.display = "none";
                shuffleBtn.title = "Activar orden aleatorio";
            }
        });

        // Backward event
        backwardBtn.addEventListener("click", () => {
            if (audioPlayer.src === "") return;
            clearTimeout(timeoutID);
            if (audioPlayer.currentTime > 0 && isFirstClick) {
                audioPlayer.currentTime = 0;
                isFirstClick = false;
                setTimeout(() => {
                    isFirstClick = true;
                }, 3000);
            } else if (!isFirstClick || audioPlayer.currentTime === 0) {
                songIndex = (songIndex - 1 + songListLength) % songListLength;
                if (!audioPlayer.paused) {
                    loadSong(songIndex);
                    audioPlayer.play();
                } else {
                    loadSong(songIndex);
                }
                isFirstClick = true;
            }

            if (previousRow) previousRow.className = "";
            previousRow = tbody.querySelector(`tr[data-id="${songListCopy[songIndex].id}"]`);
            previousRow.className = "selected";

            scrollToRow(previousRow);
        });

        // Play/pause event
        playPauseBtn.addEventListener("click", () => {
            if (audioPlayer.src === "") return;
            audioPlayer.paused ? playAudio() : pauseAudio();
        });

        // Forward event
        forwardBtn.addEventListener("click", () => {
            if (audioPlayer.src === "") return;
            songIndex = (songIndex + 1) % songListLength;
            if (!audioPlayer.paused) {
                loadSong(songIndex);
                playAudio();
            } else {
                loadSong(songIndex);
            }

            if (previousRow) previousRow.className = "";
            previousRow = tbody.querySelector(`tr[data-id="${songListCopy[songIndex].id}"]`);
            previousRow.className = "selected";

            scrollToRow(previousRow);
        });

        // Repeat event
        repeatBtn.addEventListener("click", () => {
            repeatState = (repeatState + 1) % 3;

            if (repeatState === 0) {
                audioPlayer.loop = false;
                repeatBtn.title = "Repetir playlist";
                repeatBtn.children[1].style.display = "none";
                repeatBtn.children[0].style.display = "block";
                // repeatBtn.style.color = "currentColor";
                return;
            }

            if (repeatState === 1) {
                isRepeatAll = true;
                repeatBtn.title = "Repetir canción indefinidamente";
                repeatBtn.children[0].querySelector("rect").style.display = "block";
                // repeatBtn.style.color = "#ff9800";
                return;
            }

            if (repeatState === 2) {
                isRepeatAll = false;
                audioPlayer.loop = true;
                repeatBtn.title = "Desactivar la repetición indefinida";
                repeatBtn.children[0].querySelector("rect").style.display = "none";
                repeatBtn.children[0].style.display = "none";
                repeatBtn.children[1].style.display = "block";
                return;
            }
        });

        const handleResponse = response => {
            // songList = JSON.parse(response).slice(0, 10);
            songList = JSON.parse(response);
            songListCopy = [...songList];
            songMap = new Map(songListCopy.map(song => [song.id, song]));
            // console.log(songMap);

            songListLength = songList.length;

            // ¿Podemos eliminar esta condición? No
            if (songIndex < songListLength) {
                // 1. Mostramos la lista de canciones
                displayRows(songListCopy);
                // 2. Cargamos el índice cero por defecto
                loadSong(songIndex);
                // Siendo el índice cero, no hace falta desplazar el scroll
            }
        }

        const displayRows = songList => {
            tbody.textContent = "";
            const fragment = d.createDocumentFragment();
            for (let idx = 0; idx < songListLength; idx++) {
                const tr = d.createElement("tr");
                tr.dataset.id = songList[idx].id; // Para ubicar la canción posteriormente
                tr.innerHTML = `<td>${idx + 1}</td>
                <td>${removeExtension(songList[idx].name)}</td>
                <td>${formatTime(songList[idx].duration)}</td>`;
                fragment.appendChild(tr);
            } removeExtension
            tbody.appendChild(fragment);
            tbody.children[songIndex].className = "selected";
            previousRow = tbody.children[songIndex];
            updateSelectedRow();
        }

        const updateSelectedRow = () => {
            tbody.addEventListener("click", e => {
                if (previousRow) previousRow.className = "";
                const tr = e.target.parentNode;
                console.log(e.currentTarget);
                console.log(e.target);
                if (tr.tagName !== "TR") return;
                tr.className = "selected";
                previousRow = tr;
                // Seteamos songIndex, solo cuando la reproducción es secuencial
                if (!isShuffle) songIndex = tr.children[0].textContent - 1;
                // const song = getSongById(tr.dataset.id);
                const song = songMap.get(+tr.dataset.id); // + = Number (string to number)
                audioPlayer.src = URL + song.name;
                audioPlayer.dataset.songId = song.id;
                audioPlayer.preload = 'auto';
                audioPlayer.load();
                playAudio();
                [artistName.textContent, songTitle.textContent] = splitName(song.name);
            });
        }

        const loadSong = songIndex => {
            audioPlayer.src = URL + songListCopy[songIndex].name;
            audioPlayer.dataset.songId = songListCopy[songIndex].id;
            audioPlayer.preload = 'auto';
            audioPlayer.load();
            [artistName.textContent, songTitle.textContent] = splitName(songListCopy[songIndex].name);
        }

        const pauseAudio = () => {
            audioPlayer.pause();
            playIcon.style.display = "block";
            pauseIcon.style.display = "none";
            playPauseBtn.title = "Reproducir";
        }

        const playAudio = () => {
            audioPlayer.play();
            playIcon.style.display = "none";
            pauseIcon.style.display = "block";
            playPauseBtn.title = "Pausar";
        }

        // Send request
        function sendHttpRequest(method, url, data, callback) {
            const xhr = getXhr();
            xhr.onreadystatechange = processRequest;
            function getXhr() {
                if (window.XMLHttpRequest) {
                    return new XMLHttpRequest();
                } else {
                    return new ActiveXObject("Microsoft.XMLHTTP");
                }
            }
            function processRequest() {
                if (xhr.readyState == XMLHttpRequest.DONE) {
                    if (xhr.status == 200 && xhr.response != null) {
                        if (callback) callback(xhr.response);
                    } else {
                        console.log("There was a problem retrieving the data: " + xhr.statusText);
                    }
                }
            }
            xhr.open(method, url + ((/\?/).test(url) ? "&" : "?") + (new Date()).getTime());
            xhr.onloadstart = function (e) { /*openLoader();*/ }
            xhr.onloadend = function (e) { /*closeLoader();*/ }
            if (data && !(data instanceof FormData)) xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            xhr.send(data);
            xhr.onerror = function (e) { console.log("Error: " + e + " Could not load url."); }
        }

        // https://introcs.cs.princeton.edu/java/14array/Deck.java.html
        const shuffle = arr => {
            // ¿Podemos utilizar la variable que almacena la longitud del arreglo?
            const len = arr.length;
            for (let i = 0; i < len; i++) {
                const r = i + parseInt(Math.random() * (len - i));
                [arr[i], arr[r]] = [arr[r], arr[i]];
            }
            return arr;
        }

        const sequentialPlayback = arr => {
            // Buscamos el índice
            songIndex = arr.findIndex(song => song.id == audioPlayer.dataset['songId']);
            // Devolvemos el orden del array original
            songListCopy = [...arr];
        }

        const shufflePlayback = arr => {
            // Encuentra el elemento y lo extrae del arreglo
            const currentlyPlayingSong = arr.splice(arr.findIndex(song => song.id == audioPlayer.dataset['songId']), 1)[0];
            // Barajamos el arreglo sin la cancion actualmente en reproduccion
            arr = shuffle(arr);
            // Enviamos al principio la canción que esta actualmente en reproducción despues de la mezcla
            arr.unshift(currentlyPlayingSong);
            // Seteamos el indice a cero correspondiente a la canción actualmente en reproduccion
            songIndex = 0;
        }

        // Format time in hh:mm:ss or mm:ss
        const formatTime = (seconds, format = 0) => {
            seconds = Math.round(seconds); // 287.370158
            const hours = (seconds / 3600) | 0;  // Hours calculation
            const minutes = ((seconds % 3600) / 60) | 0;  // Minutes calculation
            const remainingSeconds = (seconds % 60);  // Whole seconds

            if (format === 0) {
                return hours > 0
                    // Show hours:minutes:seconds format
                    ? `${hours}:${/*minutes < 10 ? '0' + minutes : */minutes}:${remainingSeconds < 10 ? '0' + remainingSeconds : remainingSeconds}`
                    // Show minutes:seconds format
                    : `${/*minutes < 10 ? '0' + minutes :*/ minutes}:${remainingSeconds < 10 ? '0' + remainingSeconds : remainingSeconds}`;
            }

            return hours > 0
                // Show hours:minutes:seconds format
                ? `${hours} h ${minutes} min ${remainingSeconds} s`
                // Show minutes:seconds format
                : `${minutes} min ${remainingSeconds} s`;
        }

        // Remove extension
        const removeExtension = name => {
            return name.slice(0, name.lastIndexOf("."));
        }

        const scrollToRow = row => {
            if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Find an object in an array by ID
        const getSongById = id => {
            return songListCopy.find(song => song.id == id);
        }

        const splitName = name => {
            // return { artist: name.slice(0, name.indexOf(' -')), title: name.slice(name.indexOf(' - ') + 3, -4) }
            return [name.slice(0, name.indexOf(' -')), name.slice(name.indexOf(' - ') + 3, -4)];
        }
